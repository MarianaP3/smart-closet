<div class="register-page">
  <div class="register-card">
    <p class="hero-label">Únete a SmartCloset</p>
    <h1 class="title">Crear cuenta</h1>
    <p class="subtitle">Regístrate y empieza a organizar tu closet inteligente.</p>
    <div class="divider"></div>

    <form class="register-form" (submit)="$event.preventDefault()">
      <div class="field">
        <label for="name">Nombre</label>
        <input
          class="inputField"
          type="text"
          id="name"
          name="name"
          placeholder="Tu nombre"
          autocomplete="name"
        />
      </div>

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          class="inputField"
          type="email"
          id="email"
          name="email"
          placeholder="tu@correo.com"
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          class="inputField"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input
          class="inputField"
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>

      <button class="button" type="submit">Crear cuenta</button>
    </form>

    <p class="login-text">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="login-link">Inicia sesión</a>
    </p>
  </div>
</div>

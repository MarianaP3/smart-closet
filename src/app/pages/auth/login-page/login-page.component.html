<div class="login-page">
  <div class="login-card">
    <p class="hero-label">Bienvenidx</p>
    <h1 class="title">Iniciar sesión</h1>
    <p class="subtitle">Accede a tu closet inteligente y organiza tu estilo.</p>
    <div class="divider"></div>

    <form class="login-form" (submit)="$event.preventDefault()">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          class="inputField"
          type="email"
          id="email"
          name="email"
          placeholder="tu@correo.com"
          autocomplete="email"
          [(ngModel)]="username"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          class="inputField"
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>


      <button class="button" type="submit" (click)="onSubmit()">Entrar</button>
      <p class="error-message">{{ errorMessage }}</p>
    </form>

    <p class="register-text">
      ¿Aún no tienes cuenta?
      <a routerLink="/register" class="register-link">Regístrate</a>
    </p>
  </div>
</div>
